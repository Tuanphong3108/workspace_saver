<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Saver Bridge Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@100..1000&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Google Sans Flex', sans-serif;
            background-color: #f0f4f8;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .status-card {
            background: white;
            padding: 2.5rem;
            border-radius: 2.5rem;
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.15);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        .pulse {
            width: 16px; height: 16px; background: #22d3ee; border-radius: 50%;
            display: block; margin: 0 auto 1.5rem; animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(34, 211, 238, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); }
        }
        #log { background: #020617; color: #10b981; font-size: 11px; padding: 1rem; border-radius: 1rem; text-align: left; height: 150px; overflow-y: auto; font-family: monospace; }
    </style>
</head>
<body>

    <div class="status-card border border-white/50">
        <div class="pulse"></div>
        <h1 class="text-2xl font-black text-slate-900 mb-2">GitHub Sync Engine</h1>
        <p class="text-slate-500 text-sm mb-6">Đang trực chiến trên Repo của bro Phong.</p>
        <div id="log">> System: Initializing...</div>
    </div>

    <script>
        const logElement = document.getElementById('log');
        const GH_CONFIG = {
            token: "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", 
            owner: "tuanphong3108",
            repo: "workspace_saver",
            path: "workspace_data.txt"
        };

        function addLog(msg, type = 'info') {
            const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
            let color = "text-emerald-400";
            if (type === 'error') color = "text-rose-400";
            if (type === 'warning') color = "text-amber-400";
            
            logElement.innerHTML += `<div class="${color}">[${time}] ${msg}</div>`;
            logElement.scrollTop = logElement.scrollHeight;
        }

        // Chuyển đổi Object Workspaces sang format text .txt
        function formatToTxt(workspaces) {
            let content = "";
            Object.keys(workspaces).forEach(name => {
                const links = workspaces[name];
                content += `- [Workspace]: ${name}; ${links.join(', ')}\n`;
            });
            return content || "Empty Workspace";
        }

        // Parse ngược từ .txt sang Object
        function parseTxtToData(txt) {
            const workspaces = {};
            if (!txt) return { workspaces };
            const lines = txt.split('\n');
            lines.forEach(line => {
                if (line.trim().startsWith('- [Workspace]:')) {
                    const parts = line.split(';');
                    if (parts.length >= 2) {
                        const name = parts[0].replace('- [Workspace]:', '').trim();
                        const linksStr = parts[1].trim();
                        const links = linksStr.split(',').map(l => l.trim()).filter(l => l !== "");
                        if (name) workspaces[name] = links;
                    }
                }
            });
            return { workspaces };
        }

        // Ghi dữ liệu lên GitHub
        async function commitToGitHub(workspaces) {
            const url = `https://api.github.com/repos/${GH_CONFIG.owner}/${GH_CONFIG.repo}/contents/${GH_CONFIG.path}`;
            const content = formatToTxt(workspaces);
            
            try {
                addLog("Đang kiểm tra trạng thái file trên server...");
                let sha = null;
                
                // Bước 1: Lấy SHA hiện tại (bắt buộc để update file)
                const checkRes = await fetch(url, {
                    headers: { "Authorization": `token ${GH_CONFIG.token}` }
                });

                if (checkRes.ok) {
                    const fileData = await checkRes.json();
                    sha = fileData.sha;
                    addLog("Đã lấy được SHA. Chuẩn bị ghi đè...");
                } else if (checkRes.status === 404) {
                    addLog("File chưa tồn tại. Sẽ tạo mới file .txt", "warning");
                }

                // Bước 2: Thực hiện PUT để cập nhật nội dung file
                const putRes = await fetch(url, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${GH_CONFIG.token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: `PhongSync: Cập nhật không gian làm việc (${new Date().toLocaleString()})`,
                        content: btoa(unescape(encodeURIComponent(content))), // Base64 chuẩn hỗ trợ tiếng Việt
                        sha: sha || undefined
                    })
                });

                if (putRes.ok) {
                    addLog("Ghi file thành công! Server đã nhận hàng.", "success");
                    return true;
                } else {
                    const err = await putRes.json();
                    addLog("Thất bại: " + err.message, "error");
                    return false;
                }
            } catch (e) {
                addLog("Lỗi kết nối: " + e.message, "error");
                return false;
            }
        }

        // Lắng nghe lệnh từ trang quản lý (Parent)
        window.addEventListener("message", async (event) => {
            const { type, payload } = event.data;

            if (type === "PUSH_DATA") {
                addLog("Nhận lệnh ghi dữ liệu từ Extension...");
                const success = await commitToGitHub(payload.workspaces);
                if (success) {
                    window.parent.postMessage({ type: "SYNC_CONFIRMED" }, "*");
                }
            }

            if (type === "REQUEST_PULL") {
                addLog("Đang kéo dữ liệu từ GitHub...");
                try {
                    const url = `https://api.github.com/repos/${GH_CONFIG.owner}/${GH_CONFIG.repo}/contents/${GH_CONFIG.path}`;
                    const res = await fetch(url, {
                        headers: { "Authorization": `token ${GH_CONFIG.token}` }
                    });
                    
                    if (res.ok) {
                        const fileData = await res.json();
                        const txtContent = decodeURIComponent(escape(atob(fileData.content)));
                        const data = parseTxtToData(txtContent);
                        window.parent.postMessage({ type: "PULL_DATA", payload: data }, "*");
                        addLog("Dữ liệu đã được đồng bộ về máy!", "success");
                    } else {
                        addLog("Không tìm thấy dữ liệu trên cloud.", "warning");
                    }
                } catch (e) {
                    addLog("Lỗi kéo dữ liệu: " + e.message, "error");
                }
            }
        });

        // Sẵn sàng phục vụ
        addLog("Hệ thống Bridge đã sẵn sàng!");
        window.parent.postMessage({ type: "SYNC_READY" }, "*");
    </script>
</body>
</html>
